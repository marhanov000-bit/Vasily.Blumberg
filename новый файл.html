<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бесплатная консультация</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0f1e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Raleway', sans-serif;
    padding: 20px;
  }

  .card {
    background: linear-gradient(145deg, #111827, #1a2340);
    border: 1px solid rgba(180,150,80,0.3);
    border-radius: 4px;
    max-width: 880px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }

  .photo-side {
    position: relative;
    min-height: 580px;
    overflow: hidden;
  }

  .photo-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .photo-side::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 60%, #111827 100%),
                linear-gradient(to top, rgba(10,15,30,0.5) 0%, transparent 40%);
  }

  .gold-tag {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    z-index: 2;
    text-align: center;
    padding: 0 20px;
  }

  .gold-tag span {
    background: rgba(180,150,80,0.15);
    border: 1px solid rgba(180,150,80,0.5);
    color: #d4aa50;
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 2px;
  }

  .form-side {
    padding: 44px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #b49640, #d4aa50);
    color: #0a0f1e;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    color: #f0e6cc;
    font-size: 26px;
    line-height: 1.35;
    margin-bottom: 10px;
  }

  .subtitle {
    color: #7a8099;
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 30px;
    font-weight: 400;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(to right, #d4aa50, transparent);
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    color: #9aa0b8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  input, select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    color: #e8dfc8;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.25s, background 0.25s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: rgba(212,170,80,0.6);
    background: rgba(212,170,80,0.05);
  }

  select option { background: #1a2340; }

  textarea { resize: none; height: 80px; }

  .btn {
    margin-top: 20px;
    width: 100%;
    background: linear-gradient(135deg, #b49640, #d4aa50);
    color: #0a0f1e;
    border: none;
    border-radius: 3px;
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 15px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .note {
    margin-top: 14px;
    color: #4a5068;
    font-size: 11px;
    text-align: center;
    letter-spacing: 0.3px;
  }

  .success {
    display: none;
    text-align: center;
    padding: 30px 0;
  }

  .success-icon {
    width: 56px;
    height: 56px;
    border: 2px solid #d4aa50;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    font-size: 22px;
  }

  .success h2 {
    font-family: 'Playfair Display', serif;
    color: #f0e6cc;
    font-size: 20px;
    margin-bottom: 10px;
  }

  .success p { color: #7a8099; font-size: 13px; line-height: 1.7; }

  @media (max-width: 640px) {
    .card { grid-template-columns: 1fr; }
    .photo-side { min-height: 280px; }
    .photo-side::after { background: linear-gradient(to top, #111827 0%, transparent 50%); }
    .form-side { padding: 32px 24px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="photo-side">
    <img id="photo" src="" alt="Эксперт по недвижимости">
    <div class="gold-tag"><span>Эксперт по недвижимости</span></div>
  </div>

  <div class="form-side">
    <div class="badge">Бесплатно</div>
    <h1>Консультация по недвижимости при семейных спорах</h1>
    <p class="subtitle">Час личной работы с экспертом — без оплаты</p>
    <div class="divider"></div>

    <div id="formContent">
      <div class="field">
        <label>Ваше имя</label>
        <input type="text" id="name" placeholder="Иван Иванов">
      </div>
      <div class="field">
        <label>Телефон</label>
        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
      </div>
      <div class="field">
        <label>Ситуация</label>
        <select id="situation">
          <option value="">— Выберите —</option>
          <option>Раздел имущества при разводе</option>
          <option>Наследственный спор</option>
          <option>Совместная собственность супругов</option>
          <option>Другое</option>
        </select>
      </div>
      <div class="field">
        <label>Кратко о вопросе</label>
        <textarea id="message" placeholder="Опишите вашу ситуацию..."></textarea>
      </div>
      <button class="btn" onclick="sendForm()">Записаться на консультацию</button>
      <p class="note">Нажимая кнопку, вы соглашаетесь на обработку персональных данных</p>
    </div>

    <div class="success" id="successMsg">
      <div class="success-icon">✓</div>
      <h2>Заявка принята!</h2>
      <p>Мы свяжемся с вами<br>в ближайшее время для подтверждения.</p>
    </div>
  </div>
</div>

  async function sendForm() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const situation = document.getElementById('situation').value;
    const message = document.getElementById('message').value.trim();

    if (!name || !phone) {
      alert('Пожалуйста, заполните имя и телефон');
      return;
    }

    const btn = document.querySelector('.btn');
    btn.textContent = 'Отправка...';
    btn.disabled = true;

    try {
      const resp = await fetch('https://formspree.io/f/mnjwqyrq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          name: name,
          phone: phone,
          situation: situation || 'не указана',
          message: message || 'не указан',
          _subject: 'Новая заявка на консультацию по недвижимости'
        })
      });
      if (resp.ok) {
        document.getElementById('formContent').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        alert('Ошибка отправки. Попробуйте позже.');
        btn.textContent = 'Записаться на консультацию';
        btn.disabled = false;
      }
    } catch {
      alert('Ошибка сети. Проверьте подключение.');
      btn.textContent = 'Записаться на консультацию';
      btn.disabled = false;
    }
  }
</script>
